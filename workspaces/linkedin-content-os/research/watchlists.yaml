  - url: https://www.oneusefulthing.org/feed
    label: AI-native Ops (Substack)
    platform: substack
    purpose: AI workflow design, operator judgment, and education implementation signals
    priority_lane: ai
  - url: https://www.highereddive.com/feeds/news/
