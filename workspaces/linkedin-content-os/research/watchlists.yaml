sources:
  primary:
    - platform: linkedin
      purpose: Native platform language, operator framing, intrapreneurial AI use cases
  secondary:
    - platform: reddit
      purpose: Practitioner pain, objections, and implementation friction
    - platform: blogs_news
      purpose: Product launches, market shifts, and benchmark essays

priority_people:
  - name: AI-native operators in education
    platform: linkedin
    relationship: followed
    profile_url: https://www.linkedin.com/in/ai-native-operator
    reason: Role-safe intrapreneur language and education implementation signals
    lenses: [current-role, program-leadership, ai]
    priority_weight: 0.9
  - name: GTM / revenue / growth operators
    platform: linkedin
    relationship: connected
    profile_url: https://www.linkedin.com/in/gtm-operator
    reason: Market-development, outreach, and trust-building language
    lenses: [admissions, entrepreneurship]
    priority_weight: 0.85

rss_sources:
  - url: https://www.oneusefulthing.org/feed
    label: AI-native Ops (Substack)
    platform: substack
    purpose: AI workflow design, operator judgment, and education implementation signals
    priority_lane: ai
  - url: https://www.highereddive.com/feeds/news/
    label: Admissions + Ops
    platform: rss
    purpose: Higher-ed operations, enrollment shifts, and student-journey execution signals
    priority_lane: admissions

reddit_sources:
  - subreddit: Using_AI_in_Education
    purpose: Practitioner edge cases and growth experiments
    priority_lane: ai
  - subreddit: edtech
    purpose: Product launches, funding news, and operator lessons
    priority_lane: current-role

topics:
  - ai implementation in education
  - admissions and outreach systems
  - market development and referral trust
  - leadership and operator clarity
  - intrapreneurship
  - edtech product launches
  - workflow automation

filters:
  prioritize:
    - operator language
    - role-safe AI positioning
    - intrapreneurial framing
    - leadership lessons
    - market-development relevance
  avoid:
    - obvious exit-signaling language
    - generic hustle content
    - trend chasing without operational value

curation:
  min_total_score: 110
  target_feed_size: 12
  platform_limits:
    linkedin: 4
    substack: 3
    rss: 3
    reddit: 2
    youtube: 2
  platform_boosts:
    linkedin: 18
    substack: 14
    rss: 10
    reddit: 4
    youtube: 8
  lane_boosts:
    ai: 18
    program-leadership: 16
    admissions: 14
    current-role: 12
    enrollment-management: 12
    ops-pm: 12
    referral: 8
    personal-story: 6
  keyword_boosts:
    - phrase: agent orchestration
      weight: 12
    - phrase: workflow clarity
      weight: 10
    - phrase: ai literacy
      weight: 10
    - phrase: operator judgment
      weight: 9
    - phrase: change management
      weight: 8
    - phrase: enrollment
      weight: 7
    - phrase: referral
      weight: 7
    - phrase: family trust
      weight: 7
    - phrase: student journey
      weight: 6
    - phrase: education access
      weight: 6
  demoted_phrases:
    - phrase: funding round
      weight: 10
    - phrase: product launch
      weight: 8
    - phrase: viral thread
      weight: 8
    - phrase: growth hack
      weight: 12
  blocked_phrases:
    - quit your job
    - i made 10k
    - 10x founder
    - no-context ai hot take
