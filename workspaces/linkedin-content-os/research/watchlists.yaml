youtube_channels:
  - name: Nate B Jones
    url: https://www.youtube.com/@NateBJones
    purpose: Leadership, AI, and operator framing
    priority_lane: program-leadership
    ingest_mode: auto_ingest
    auto_ingest: true
  - name: Champion Leadership
    url: https://www.youtube.com/@championleadership
    purpose: Leadership, standards, and execution discipline
    priority_lane: program-leadership
    ingest_mode: auto_ingest
    auto_ingest: true
  - name: All-In Podcast
    url: https://www.youtube.com/@allin
    purpose: Market, tech, and AI discussion
    priority_lane: entrepreneurship
    ingest_mode: rss_primary
    auto_ingest: false
  - name: Selected AI YouTube Channel
    url: https://www.youtube.com/channel/UCuQIul0FqNDH5Qb7KLvRjxg
    purpose: User-selected high-signal AI source pending direct channel intake
    priority_lane: ai
    ingest_mode: auto_ingest
    auto_ingest: true

youtube_auto_ingest:
  enabled: true
  max_videos_per_run: 3
  per_channel_limit: 1

topics:
  - ai implementation in education
  - admissions and outreach systems
  - market development and referral trust
  - leadership and operator clarity
  - intrapreneurship
  - edtech product launches
  - workflow automation
  - podcast-to-post signal mining
  - operator lessons from creator-led media

filters:
  prioritize:
    - operator language
    - role-safe AI positioning
    - intrapreneurial framing
    - leadership lessons
    - market-development relevance
  avoid:
    - obvious exit-signaling language
    - generic hustle content
    - trend chasing without operational value

curation:
  min_total_score: 110
  target_feed_size: 12
  platform_limits:
    linkedin: 4
    substack: 3
    rss: 3
    reddit: 2
    youtube: 2
  platform_boosts:
    linkedin: 18
    substack: 14
    rss: 10
    reddit: 4
    youtube: 8
  lane_boosts:
    ai: 18
    program-leadership: 16
    admissions: 14
    current-role: 12
    enrollment-management: 12
    ops-pm: 12
    referral: 8
    personal-story: 6
  keyword_boosts:
    - phrase: agent orchestration
      weight: 12
    - phrase: workflow clarity
      weight: 10
    - phrase: ai literacy
      weight: 10
    - phrase: operator judgment
      weight: 9
    - phrase: change management
      weight: 8
    - phrase: enrollment
      weight: 7
    - phrase: referral
      weight: 7
    - phrase: family trust
      weight: 7
    - phrase: student journey
      weight: 6
    - phrase: education access
      weight: 6
  demoted_phrases:
    - phrase: funding round
      weight: 10
    - phrase: product launch
      weight: 8
    - phrase: viral thread
      weight: 8
    - phrase: growth hack
      weight: 12
  blocked_phrases:
    - quit your job
    - i made 10k
    - 10x founder
    - no-context ai hot take
